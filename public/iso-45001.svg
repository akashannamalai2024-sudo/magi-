<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer borders -->
  <circle cx="100" cy="100" r="96" fill="#ffffff" stroke="#1f5a9e" stroke-width="4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1f5a9e" stroke-width="1.5"/>
  
  <!-- Inner blue circle -->
  <circle cx="100" cy="100" r="64" fill="#1f5a9e"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- Text paths -->
  <path id="topTextPath" d="M 32,100 A 68,68 0 0,1 168,100" fill="none"/>
  <path id="bottomTextPath" d="M 16,100 A 84,84 0 0,0 184,100" fill="none"/>
  
  <!-- Curved Text -->
  <text fill="#1f5a9e" font-family="Arial, sans-serif" font-weight="900" font-size="20" letter-spacing="1">
    <textPath href="#topTextPath" startOffset="50%" text-anchor="middle">CERTIFIED</textPath>
  </text>
  <text fill="#1f5a9e" font-family="Arial, sans-serif" font-weight="900" font-size="20" letter-spacing="1">
    <textPath href="#bottomTextPath" startOffset="50%" text-anchor="middle">COMPANY</textPath>
  </text>
  
  <!-- Inner globe simplified -->
  <path d="M 100,36 V 164 M 36,100 H 164" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <path d="M 100,36 A 35,64 0 0,0 100,164 A 35,64 0 0,0 100,36" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <path d="M 36,100 A 64,25 0 0,0 164,100 A 64,25 0 0,0 36,100" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  
  <!-- Main Text -->
  <text x="100" y="86" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="32" text-anchor="middle" dominant-baseline="middle">ISO</text>
  <text x="100" y="122" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">45001</text>
  
  <!-- Stars -->
  <g fill="#1f5a9e">
    <polygon points="0,-7 2,-2.5 7,-2.5 3,1 4.5,6 0,3 -4.5,6 -3,1 -7,-2.5 -2,-2.5" transform="translate(24, 100)"/>
    <polygon points="0,-7 2,-2.5 7,-2.5 3,1 4.5,6 0,3 -4.5,6 -3,1 -7,-2.5 -2,-2.5" transform="translate(176, 100)"/>
  </g>
</svg>
